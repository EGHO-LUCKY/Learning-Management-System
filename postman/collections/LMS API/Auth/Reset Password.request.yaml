$kind: http-request
name: 'Reset Password'
method: POST
url: '{{baseUrl}}/api/v1/auth/reset-password/:token'
order: 6000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: token
    value: '{{resetToken}}'
body:
  type: json
  content: |-
    {
      "newPassword": "NewPassword1"
    }
