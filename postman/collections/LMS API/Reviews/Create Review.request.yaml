$kind: http-request
name: 'Create Review'
method: POST
url: '{{baseUrl}}/api/v1/courses/:courseId/reviews'
order: 2000
headers:
  - key: Content-Type
    value: application/json
pathVariables:
  - key: courseId
    value: '{{courseId}}'
body:
  type: json
  content: |-
    {
      "rating": 5,
      "comment": "Great course!"
    }
